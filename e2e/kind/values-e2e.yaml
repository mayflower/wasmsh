# Helm values overlay used by the kind-based end-to-end tests.
#
# Goals vs. the production defaults:
#   - no digest pinning (we load images by tag via `kind load`)
#   - pullPolicy: Never (kind-loaded images must not be re-pulled)
#   - small resource requests so the whole stack fits on a single kind node
#   - disable HPA, PDB, NetworkPolicy, monitoring — they need controllers
#     kind does not ship by default, and they are not what we test here
#
# NOTE: the runner image assumes Pyodide assets are baked in; see
# deploy/docker/Dockerfile.runner.

dispatcher:
  replicaCount: 1
  image:
    repository: wasmsh-dispatcher
    tag: e2e
    digest: ""
    pullPolicy: Never
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      # Peak RSS per 10 MiB upload is ~15 MiB Bytes (in) + 15 MiB Bytes
      # (out to/from runner) + tokio/reqwest buffers.  With the streaming
      # forward (service.rs `response_to_json_response`) we no longer
      # parse serde_json::Value trees, so concurrent standard-suite
      # requests fit comfortably in 512 MiB.
      memory: 512Mi
  pdb:
    enabled: false
  terminationGracePeriodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 1
    periodSeconds: 2
    failureThreshold: 10
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 2
    periodSeconds: 5

runner:
  replicaCount: 2
  image:
    repository: wasmsh-runner
    tag: e2e
    digest: ""
    pullPolicy: Never
  # The kind-local runner needs much less headroom than production.  We only
  # warm one restore slot so pod startup stays under ~60s on a laptop.
  restoreSlots: 2
  startupWarmRestores: 1
  fetchBroker:
    requestBytes: 65536
    responseBytes: 524288
  workerResourceLimits:
    # Raised from the production default (48 MiB) so the langchain-tests
    # standard suite's 10 MiB upload (~13 MiB after base64) fits.  The
    # dispatcher-compose e2e uses the same 256 MiB value.
    maxOldGenerationMb: 256
    maxYoungGenerationMb: 16
    stackMb: 1
    codeRangeMb: 8
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      # Must fit: 2 warm session workers + template worker + runner proc +
      # JSON parse headroom for 10 MiB base64 uploads (~13 MiB expanded).
      # 256 MiB worker heap × 3 + overhead ≈ 1 GiB; allow ~3× that so the
      # runner container never OOMs under the langchain-tests suite.
      memory: 3Gi
  pdb:
    enabled: false
  terminationGracePeriodSeconds: 30
  # Pyodide boot can easily take 30s+ in a cold container; give readiness a
  # generous window so the dispatcher does not flap the pod out of rotation.
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 3
    failureThreshold: 60
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 6

networkPolicy:
  enabled: false

autoscaling:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: false
  prometheusRule:
    enabled: false
