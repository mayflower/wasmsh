sonar.projectKey=mayflower_wasmsh
sonar.projectName=WasmSH

# Source directories
sonar.sources=crates

# Exclusions - test code, build artifacts, generated files, benchmarks
sonar.exclusions=**/target/**,**/tests/**,**/benches/**,**/fuzz/**,**/examples/**,**/pkg/**

# Test directories
sonar.tests=crates
sonar.test.inclusions=**/tests/**,**/*_test.rs

# No coverage reports in scan-only mode (k8s runner has no build tools).
# Coverage can be added later by uploading lcov artifacts from the CI workflow.

# Ignore generated wasm-bindgen code
sonar.coverage.exclusions=**/wasm_bindings/**,**/benches/**,**/tests/**,**/fuzz/**
