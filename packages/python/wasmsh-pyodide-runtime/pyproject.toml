[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wasmsh-pyodide-runtime"
version = "0.6.3"
description = "Pyodide-backed wasmsh runtime assets for Python integrations"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14"
]

[tool.setuptools.package-data]
# Each `assets/foo/*` entry is one directory deep only; setuptools' fnmatch-
# based package_data does not recurse.  Every subdirectory of assets/ must
# be listed explicitly or its files will be missing from the published
# wheel / sdist (that's how `assets/lib/baseline/boot-plan.mjs` went
# missing in 0.5.10-0.6.2 — the adapter unit tests import it at runtime
# and fail with ERR_MODULE_NOT_FOUND).  When a new subdirectory is added,
# add its glob here.
"wasmsh_pyodide_runtime" = [
    "assets/*",
    "assets/lib/*",
    "assets/lib/baseline/*",
    "assets/lib/snapshot/*",
    "py.typed",
]

