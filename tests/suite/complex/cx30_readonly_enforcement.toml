[test]
name = "readonly-enforcement"
tags = ["complex", "readonly", "P0"]
tier = "P0"
requires = ["readonly", "variable-assignment", "stderr-redirection", "echo"]

[input]
script = """
readonly VERSION="1.0"
VERSION="2.0" 2>/dev/null
echo "VERSION=$VERSION"
"""

[expect]
status = 0
stdout = "VERSION=1.0\n"
