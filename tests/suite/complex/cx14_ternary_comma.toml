[test]
name = "ternary-and-comma-operator"
tags = ["complex", "arithmetic", "P1"]
tier = "P1"
requires = ["arithmetic-expansion", "arithmetic-assignment", "arithmetic-comparison", "echo"]

[input]
script = """
x=10
y=20
echo "max=$(( x > y ? x : y ))"
echo "result=$(( a=5, b=10, a+b ))"
echo "a=$a b=$b"
"""

[expect]
status = 0
stdout = "max=20\nresult=15\na=5 b=10\n"
