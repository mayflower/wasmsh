[test]
name = "break-multiple-levels"
tags = ["complex", "control-flow", "P0"]
tier = "P0"
requires = ["for-in", "if", "break", "test", "echo"]

[input]
script = """
for i in 1 2 3; do
    for j in a b c; do
        if [ "$j" = "b" ]; then
            break 2
        fi
        echo "$i$j"
    done
done
echo "done"
"""

[expect]
status = 0
stdout = "1a\ndone\n"
