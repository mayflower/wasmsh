<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepAgents + wasmsh — Browser Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; }
    .setup { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    input { width: 100%; padding: 0.5rem; font-family: monospace; box-sizing: border-box; }
    button { padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin: 1rem 0; font-style: italic; color: #666; }
    #output { white-space: pre-wrap; background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.9rem; min-height: 200px; }
  </style>
</head>
<body>
  <h1>DeepAgents + wasmsh — Fully In-Browser</h1>
  <p>Everything runs in your browser: the LLM agent, shell, Python, and filesystem. No backend server.</p>

  <div class="setup">
    <label for="apiKey">Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
    <br>
    <label for="prompt">Task for the agent</label>
    <input type="text" id="prompt" value="Write a Python script that generates 10 random numbers, sorts them, and saves the result to /workspace/sorted.json" />
    <br>
    <button id="runBtn" onclick="runAgent()">Run Agent</button>
  </div>

  <div id="status">Ready. Enter your API key and click Run.</div>
  <div id="output"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
