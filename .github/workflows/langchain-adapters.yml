name: LangChain Adapters

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/langchain-adapters.yml'
      - 'packages/npm/langchain-wasmsh/**'
      - 'packages/python/langchain-wasmsh/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/langchain-adapters.yml'
      - 'packages/npm/langchain-wasmsh/**'
      - 'packages/python/langchain-wasmsh/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'

concurrency:
  group: langchain-adapters-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Python adapter ─────────────────────────────────────────
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: mayflower-k8s-runners
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/python/langchain-wasmsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - name: Install Node.js (runtime for WasmshSandbox subprocess)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync dependencies
        run: uv sync --group test

      - name: Lint (ruff check)
        run: uv run --group test ruff check langchain_wasmsh tests

      - name: Format check (ruff format)
        run: uv run --group test ruff format --check langchain_wasmsh tests

      - name: Unit tests (mocked, no subprocess)
        run: uv run --group test pytest tests/unit_tests/test_sandbox_mocked.py tests/test_import.py -v --disable-socket --allow-unix-socket

      - name: Subprocess tests (real Node runtime)
        # tests/unit_tests/test_sandbox.py pokes a real wasmsh-pyodide
        # subprocess and needs the bundled pyodide assets.  Run it as a
        # smoke check — skipif handles the missing-runtime case.
        run: uv run --group test pytest tests/unit_tests/test_sandbox.py -v

      - name: Build wheel
        run: uv build --wheel

  # ── npm adapter ────────────────────────────────────────────
  npm:
    name: npm (Node ${{ matrix.node-version }})
    runs-on: mayflower-k8s-runners
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.20.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @mayflowergmbh/langchain-wasmsh typecheck

      - name: Build
        run: pnpm --filter @mayflowergmbh/langchain-wasmsh build

      - name: Unit tests
        run: pnpm --filter @mayflowergmbh/langchain-wasmsh test:unit
