name: Build WASM

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build WASM artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen

      - name: Build with wasm-pack (bundler target)
        run: wasm-pack build crates/wasmsh-browser --target bundler --release --out-dir ../../pkg/bundler

      - name: Build with wasm-pack (web target)
        run: wasm-pack build crates/wasmsh-browser --target web --release --out-dir ../../pkg/web

      - name: Build with wasm-pack (nodejs target)
        run: wasm-pack build crates/wasmsh-browser --target nodejs --release --out-dir ../../pkg/nodejs

      - name: Optimize with wasm-opt
        run: |
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                wasm-opt -Os --enable-bulk-memory --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int "$f" -o "$f.opt"
                mv "$f.opt" "$f"
              fi
            done
          done

      - name: Report sizes
        run: |
          echo "## WASM Binary Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            target=$(basename "$dir")
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                size=$(wc -c < "$f" | tr -d ' ')
                gzip_size=$(gzip -c "$f" | wc -c | tr -d ' ')
                echo "| $target | $(basename \"$f\") | ${size} bytes (${gzip_size} gzipped) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          done

      - name: Upload bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-bundler
          path: pkg/bundler/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-web
          path: pkg/web/

      - name: Upload nodejs artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-nodejs
          path: pkg/nodejs/

      # ── Standalone E2E gate ─────────────────────────────────────
      # Builds the wasm a second time into `e2e/standalone/fixture/pkg`
      # (where the Playwright fixture loads it from) and runs the full
      # standalone Playwright suite.  Without this gate, regressions in
      # the standalone path go undetected — we already shipped a broken
      # network-backend init that nobody noticed because the suite
      # never ran in CI.
      - name: Install just
        uses: extractions/setup-just@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build standalone wasm into e2e fixture
        run: just build-standalone

      - name: Install Playwright browsers
        working-directory: e2e/standalone
        run: npm install && npx playwright install chromium --with-deps

      - name: Run standalone browser E2E
        run: just test-e2e-standalone

  build-pyodide:
    name: Build Pyodide artifact
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          key: pyodide-build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential wget ccache pkg-config xz-utils autoconf automake libtool

      - name: Build custom Pyodide
        run: just build-pyodide
        env:
          SED: sed

      - name: Report sizes
        run: |
          echo "## Pyodide Build Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/pyodide-custom/*; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              echo "| $(basename "$f") | ${size} bytes |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload Pyodide artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide
          path: dist/pyodide-custom/

