name: Build WASM

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build WASM artifacts
    runs-on: mayflower-k8s-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen

      - name: Build with wasm-pack (bundler target)
        run: wasm-pack build crates/wasmsh-browser --target bundler --release --out-dir ../../pkg/bundler

      - name: Build with wasm-pack (web target)
        run: wasm-pack build crates/wasmsh-browser --target web --release --out-dir ../../pkg/web

      - name: Build with wasm-pack (nodejs target)
        run: wasm-pack build crates/wasmsh-browser --target nodejs --release --out-dir ../../pkg/nodejs

      - name: Optimize with wasm-opt
        run: |
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                wasm-opt -Os --enable-bulk-memory --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int "$f" -o "$f.opt"
                mv "$f.opt" "$f"
              fi
            done
          done

      - name: Report sizes
        run: |
          echo "## WASM Binary Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            target=$(basename "$dir")
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                size=$(wc -c < "$f" | tr -d ' ')
                gzip_size=$(gzip -c "$f" | wc -c | tr -d ' ')
                echo "| $target | $(basename \"$f\") | ${size} bytes (${gzip_size} gzipped) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          done

      - name: Upload bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-bundler
          path: pkg/bundler/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-web
          path: pkg/web/

      - name: Upload nodejs artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-nodejs
          path: pkg/nodejs/

  # ── Standalone browser E2E gate ─────────────────────────────────
  # Builds the wasm into `e2e/standalone/fixture/pkg` and runs the full
  # standalone Playwright suite.  All wasmsh CI runs on the k8s runner
  # (`mayflower-k8s-runners`) — github-hosted runners ran into worker
  # timeouts and `WebAssembly.Table.grow()` failures on tight memory
  # the first time this suite was exercised in CI.
  #
  # Without this gate, regressions in the standalone path go undetected
  # — we already shipped a broken network-backend init that nobody
  # noticed because the suite never ran in CI.
  e2e-standalone:
    name: Standalone browser E2E
    runs-on: mayflower-k8s-runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: standalone-e2e

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build standalone wasm into e2e fixture
        run: just build-standalone

      - name: Install Playwright browsers
        working-directory: e2e/standalone
        run: npm install && npx playwright install chromium --with-deps

      - name: Run standalone browser E2E
        run: just test-e2e-standalone

  build-pyodide:
    name: Build Pyodide artifact
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ── Tier-2 cache: Pyodide source + emsdk ────────────────────
      # The Pyodide build is the dominant cost in CI (~30 min).  Most
      # of that time is the emsdk install (~5 min) and the CPython +
      # libffi + pyodide-build builds.  Both are version-locked: they
      # only need to rebuild when `tools/pyodide/versions.env` changes
      # (the single source of truth for PYODIDE_VERSION + EMSCRIPTEN
      # _VERSION).  Cache the whole `pyodide-src/` tree keyed on its
      # hash so subsequent CI runs skip straight to the wasmsh staticlib
      # build + final emcc relink.
      #
      # Safety: even if a cached pyodide.asm.wasm contains stale code,
      # build-custom.sh deletes it when the freshly-built wasmsh
      # staticlib is newer (see "Runtime lib is newer than" guard
      # added in 0e447bb).  Per-patch idempotency from b1ad993 means
      # cached patched files don't double-apply on re-run.
      #
      # No `restore-keys` fallback: a versions.env bump must rebuild
      # from scratch, not silently reuse an old emsdk install.
      - name: Cache Pyodide source + emsdk
        uses: actions/cache@v4
        with:
          path: tools/pyodide/pyodide-src
          key: pyodide-toolchain-${{ runner.os }}-${{ hashFiles('tools/pyodide/versions.env') }}

      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          key: pyodide-build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Pyodide build deps
        run: sudo apt-get install -y wget ccache xz-utils autoconf automake libtool

      - name: Build custom Pyodide
        run: just build-pyodide
        env:
          SED: sed

      - name: Report sizes
        run: |
          echo "## Pyodide Build Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/pyodide-custom/*; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              echo "| $(basename "$f") | ${size} bytes |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload Pyodide artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide
          path: dist/pyodide-custom/
