name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Format ─────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all --check

  # ── Clippy (native) ────────────────────────────────────────
  clippy:
    name: clippy (native)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Clippy (wasm32) ────────────────────────────────────────
  clippy-wasm:
    name: clippy (wasm32)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: wasm32
      - run: rustup target add wasm32-unknown-unknown
      - name: Clippy wasm32 crates
        run: >
          cargo clippy
          --target wasm32-unknown-unknown
          -p wasmsh-ast
          -p wasmsh-lex
          -p wasmsh-parse
          -p wasmsh-expand
          -p wasmsh-hir
          -p wasmsh-ir
          -p wasmsh-state
          -p wasmsh-fs
          -p wasmsh-builtins
          -p wasmsh-utils
          -p wasmsh-vm
          -p wasmsh-protocol
          -p wasmsh-runtime
          -p wasmsh-browser
          -- -D warnings

  # ── Tests (native) ──────────────────────────────────────────
  # wasmsh targets wasm32-unknown-unknown — all code is OS-independent
  # (no std::fs, no OS processes). Single-platform CI is sufficient.
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Unit and integration tests
        run: cargo nextest run --workspace --all-features
      - name: Doc tests
        run: cargo test --doc --workspace --all-features
      - name: TOML suite tests
        run: cargo test -p wasmsh-testkit --test suite_runner

  # ── Wasm build ─────────────────────────────────────────────
  wasm-build:
    name: wasm32 build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: wasm32-build
      - run: rustup target add wasm32-unknown-unknown
      - name: Build wasmsh-browser for wasm32 (dist profile)
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --profile dist
          -p wasmsh-browser
      - name: Install binaryen (wasm-opt)
        run: npm install -g binaryen
      - name: Run wasm-opt post-processing
        run: |
          WASM=target/wasm32-unknown-unknown/dist/wasmsh_browser.wasm
          if [ -f "$WASM" ]; then
            wasm-opt -Os --enable-bulk-memory --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int "$WASM" -o target/wasmsh-browser-opt.wasm
          else
            echo "No cdylib .wasm file found (rlib only) — skipping wasm-opt"
          fi
      - name: Check binary size against budget
        run: |
          WASM=target/wasm32-unknown-unknown/dist/wasmsh_browser.wasm
          OPT=target/wasmsh-browser-opt.wasm
          if [ ! -f "$WASM" ] || [ ! -f "$OPT" ]; then
            echo "No .wasm binary produced (rlib crate) — skipping size check"
            exit 0
          fi
          ORIG=$(wc -c < "$WASM" | tr -d ' ')
          OPT_SIZE=$(wc -c < "$OPT" | tr -d ' ')
          echo "Original : ${ORIG} bytes"
          echo "Optimized: ${OPT_SIZE} bytes"
          BUDGET=2097152
          echo "Budget   : ${BUDGET} bytes (2 MB)"
          {
            echo "## Wasm binary size"
            echo "| Binary | Size (bytes) |"
            echo "| ------ | ------------ |"
            echo "| Original (dist profile) | ${ORIG} |"
            echo "| Optimized (wasm-opt -Os) | ${OPT_SIZE} |"
            echo "| Budget | ${BUDGET} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$OPT_SIZE" -gt "$BUDGET" ]; then
            echo "ERROR: Optimized binary (${OPT_SIZE} bytes) exceeds 2 MB budget!"
            exit 1
          fi
          echo "Size check passed."
      - name: Upload wasm artifacts
        if: hashFiles('target/wasm32-unknown-unknown/dist/wasmsh_browser.wasm') != ''
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-wasm32
          path: |
            target/wasm32-unknown-unknown/dist/wasmsh_browser.wasm
            target/wasmsh-browser-opt.wasm
          retention-days: 7

  # ── MSRV ───────────────────────────────────────────────────
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: rustup install 1.89 --profile minimal
      - run: cargo +1.89 check --workspace

  # ── License and advisory audit ─────────────────────────────
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Code coverage ──────────────────────────────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Generate coverage
        run: >
          cargo llvm-cov nextest
          --workspace
          --all-features
          --lcov
          --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
      - name: Convert lcov to SonarQube generic coverage XML
        run: |
          python3 << 'PYEOF'
          import re, sys, os
          from collections import defaultdict

          workspace = os.getcwd() + "/"
          files = defaultdict(lambda: {"lines": {}})
          current_file = None
          with open("lcov.info") as f:
              for line in f:
                  line = line.strip()
                  if line.startswith("SF:"):
                      path = line[3:]
                      # Strip workspace prefix to produce relative paths
                      if path.startswith(workspace):
                          path = path[len(workspace):]
                      current_file = path
                  elif line.startswith("DA:") and current_file:
                      parts = line[3:].split(",")
                      if len(parts) >= 2:
                          lineno, hits = int(parts[0]), int(parts[1])
                          files[current_file]["lines"][lineno] = hits
                  elif line == "end_of_record":
                      current_file = None

          with open("sonar-coverage.xml", "w") as out:
              out.write('<coverage version="1">\n')
              for filepath in sorted(files):
                  out.write(f'  <file path="{filepath}">\n')
                  for lineno in sorted(files[filepath]["lines"]):
                      hits = files[filepath]["lines"][lineno]
                      covered = "true" if hits > 0 else "false"
                      out.write(f'    <lineToCover lineNumber="{lineno}" covered="{covered}"/>\n')
                  out.write('  </file>\n')
              out.write('</coverage>\n')
          print(f"Converted {len(files)} files to sonar-coverage.xml")
          PYEOF
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            sonar-coverage.xml
          retention-days: 14

  # ── Documentation build ────────────────────────────────────
  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build rustdoc
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Feature powerset check ─────────────────────────────────
  feature-check:
    name: Feature combinations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: feature-powerset
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --feature-powerset --no-dev-deps --workspace

  # ── Dead dependency detection ──────────────────────────────
  machete:
    name: Dead dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: bnjbvr/cargo-machete@main

  # ── Semver compatibility ────────────────────────────────────
  semver:
    name: Semver check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  # ── All checks gate ────────────────────────────────────────
  ci-pass:
    name: CI passed
    if: always()
    needs: [fmt, clippy, clippy-wasm, test, wasm-build, msrv, deny, docs, feature-check, machete]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results="${{ needs.fmt.result }} ${{ needs.clippy.result }} ${{ needs.clippy-wasm.result }} ${{ needs.test.result }} ${{ needs.wasm-build.result }} ${{ needs.msrv.result }} ${{ needs.deny.result }} ${{ needs.docs.result }} ${{ needs.feature-check.result }} ${{ needs.machete.result }}"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "Job failed: $r"
              exit 1
            fi
          done
          echo "All CI checks passed"
