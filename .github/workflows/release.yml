name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Validate before release ────────────────────────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run all tests
        run: cargo nextest run --workspace --all-features
        env:
          RUSTFLAGS: "-D warnings"
      - name: Run TOML suite
        run: cargo test -p wasmsh-testkit --test suite_runner
        env:
          RUSTFLAGS: "-D warnings"
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Build wasm32 release artifacts ─────────────────────────
  build-wasm:
    name: build wasm32
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Build with wasm-pack (bundler)
        run: wasm-pack build crates/wasmsh-browser --target bundler --release --out-dir ../../pkg/bundler
      - name: Build with wasm-pack (web)
        run: wasm-pack build crates/wasmsh-browser --target web --release --out-dir ../../pkg/web
      - name: Build with wasm-pack (nodejs)
        run: wasm-pack build crates/wasmsh-browser --target nodejs --release --out-dir ../../pkg/nodejs
      - name: Optimize with wasm-opt
        run: |
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                wasm-opt -Os --enable-bulk-memory --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int "$f" -o "$f.opt"
                mv "$f.opt" "$f"
              fi
            done
          done
      - name: Package artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp -r pkg/bundler dist/bundler
          cp -r pkg/web dist/web
          cp -r pkg/nodejs dist/nodejs
          cp LICENSE README.md SUPPORTED.md dist/
          echo "$TAG_NAME" > dist/VERSION
          tar czf "wasmsh-wasm32-${TAG_NAME}.tar.gz" -C dist .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-wasm32
          path: "wasmsh-wasm32-*.tar.gz"

  # ── Create GitHub Release ──────────────────────────────────
  release:
    name: github release
    needs: [validate, build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasmsh-wasm32
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "wasmsh-wasm32-*.tar.gz"
          draft: false
          prerelease: false
