name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # needed for PyPI trusted publishing

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Validate before release ────────────────────────────────
  validate:
    name: validate
    runs-on: mayflower-k8s-runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run all tests
        run: cargo nextest run --workspace --all-features
        env:
          RUSTFLAGS: "-D warnings"
      - name: Run TOML suite
        run: cargo test -p wasmsh-testkit --test suite_runner
        env:
          RUSTFLAGS: "-D warnings"
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Build standalone wasm32 artifacts ─────────────────────
  build-standalone:
    name: build standalone wasm32
    needs: validate
    runs-on: mayflower-k8s-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Build with wasm-pack (bundler)
        run: wasm-pack build crates/wasmsh-browser --target bundler --release --out-dir ../../pkg/bundler
      - name: Build with wasm-pack (web)
        run: wasm-pack build crates/wasmsh-browser --target web --release --out-dir ../../pkg/web
      - name: Build with wasm-pack (nodejs)
        run: wasm-pack build crates/wasmsh-browser --target nodejs --release --out-dir ../../pkg/nodejs
      - name: Optimize with wasm-opt
        run: |
          for dir in pkg/bundler pkg/web pkg/nodejs; do
            for f in "$dir"/*.wasm; do
              if [ -f "$f" ]; then
                wasm-opt -Os --enable-bulk-memory --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int "$f" -o "$f.opt"
                mv "$f.opt" "$f"
              fi
            done
          done
      - name: Package standalone artifact
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-standalone
          cp -r pkg/bundler release-standalone/bundler
          cp -r pkg/web release-standalone/web
          cp -r pkg/nodejs release-standalone/nodejs
          cp LICENSE README.md SUPPORTED.md release-standalone/
          echo "$TAG_NAME" > release-standalone/VERSION
          tar czf "wasmsh-standalone-${TAG_NAME}.tar.gz" -C release-standalone .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-standalone
          path: "wasmsh-standalone-*.tar.gz"

  # ── Build Pyodide artifact ───────────────────────────────
  build-pyodide:
    name: build pyodide
    needs: validate
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
      - uses: Swatinem/rust-cache@v2
        with:
          key: pyodide-release
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential wget ccache pkg-config xz-utils autoconf automake libtool
      - name: Build custom Pyodide
        run: just build-pyodide
        env:
          SED: sed
      - name: Package runtime assets
        run: just package-pyodide-runtime
      # Build-contract canary — see comment in .github/workflows/pyodide.yml.
      - name: Run emscripten build-contract test
        run: just test-emscripten-probe
      # Gate the release on the Pyodide E2E suite.  The build step alone is
      # not sufficient: v0.5.7 and v0.5.8 both produced "successful" wasm
      # artifacts that failed to load compiled side modules at runtime.
      # Running the full e2e suite against the freshly built wasm is the
      # thing that would have caught both regressions before publish.
      - name: Run Pyodide Node E2E against the built wasm
        run: just test-e2e-pyodide-node
      - name: Package Pyodide dist artifact
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cp LICENSE README.md SUPPORTED.md dist/pyodide-custom/
          echo "$TAG_NAME" > dist/pyodide-custom/VERSION
          tar czf "wasmsh-pyodide-${TAG_NAME}.tar.gz" -C dist/pyodide-custom .
      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide-npm
          path: packages/npm/wasmsh-pyodide/
      - name: Upload python package
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide-runtime-py
          path: packages/python/wasmsh-pyodide-runtime/
      - name: Upload pyodide dist
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide-dist
          path: "wasmsh-pyodide-*.tar.gz"

  # ── Publish Rust crates to crates.io ──────────────────────
  # Gated on build-pyodide so the whole release either lands together or
  # not at all.  Historically publish-crates ran in parallel with
  # build-pyodide, and at v0.5.8 the crates landed on crates.io while
  # build-pyodide failed — leaving 15 orphaned crates that could only be
  # yanked.  Never again.
  publish-crates:
    name: publish crates.io
    needs: [validate, build-standalone, build-pyodide]
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish workspace crates (sequential, respecting rate limits)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          CRATES=(
            wasmsh-ast wasmsh-ir wasmsh-state wasmsh-fs wasmsh-protocol
            wasmsh-lex wasmsh-parse wasmsh-hir
            wasmsh-builtins wasmsh-utils wasmsh-expand
            wasmsh-vm
            wasmsh-runtime
            wasmsh-browser wasmsh-testkit
          )
          publish_crate() {
            local crate=$1
            local deadline=$((SECONDS + 900))
            while true; do
              output=$(cargo publish -p "$crate" --no-verify 2>&1) && {
                echo "$output"
                return 0
              }
              echo "$output"
              if echo "$output" | grep -q "already exists"; then
                echo "$crate already published, skipping"
                return 0
              fi
              if echo "$output" | grep -q "429" && [ $SECONDS -lt $deadline ]; then
                local wait=$((deadline - SECONDS))
                echo "Rate limited, retrying in 120s (${wait}s left before giving up)..."
                sleep 120
              else
                return 1
              fi
            done
          }
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            publish_crate "$crate"
            echo "::endgroup::"
            sleep 15
          done

  # ── Publish npm package (trusted publishing via OIDC) ─────
  publish-npm:
    name: publish npm
    needs: build-pyodide
    runs-on: mayflower-k8s-runners
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"
      - name: Install npm with OIDC trusted publishing support
        run: npm install -g npm@latest && npm --version
      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: wasmsh-pyodide-npm
          path: package/
      - name: Verify package contents
        run: |
          ls -la package/
          node -e "const p = require('./package/package.json'); console.log(p.name + '@' + p.version)"
      - name: Publish to npm
        run: |
          npm publish ./package/ --access public 2>&1 || {
            if npm view "$(node -e "const p=require('./package/package.json');console.log(p.name+'@'+p.version)")" version 2>/dev/null; then
              echo "Version already published, skipping"
            else
              exit 1
            fi
          }

  # ── Publish Python package to PyPI (trusted publishing) ───
  publish-pypi:
    name: publish pypi
    needs: build-pyodide
    runs-on: mayflower-k8s-runners
    timeout-minutes: 15
    environment: pypi-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Download python package
        uses: actions/download-artifact@v4
        with:
          name: wasmsh-pyodide-runtime-py
          path: package/
      - name: Build sdist and wheel
        run: |
          pip install build
          cd package && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: package/dist/
          skip-existing: true

  # ── Create GitHub Release ──────────────────────────────────
  release:
    name: github release
    needs: [build-standalone, build-pyodide, publish-crates, publish-npm, publish-pypi]
    runs-on: mayflower-k8s-runners
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: wasmsh-standalone
      - name: Download pyodide dist
        uses: actions/download-artifact@v4
        with:
          name: wasmsh-pyodide-dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "wasmsh-*.tar.gz"
          draft: false
          prerelease: false
