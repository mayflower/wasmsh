name: Pyodide

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pyodide.yml'
      - 'crates/wasmsh-runtime/**'
      - 'crates/wasmsh-pyodide/**'
      - 'crates/wasmsh-pyodide-probe/**'
      - 'crates/wasmsh-fs/**'
      - 'tools/pyodide/**'
      - 'e2e/pyodide-node/**'
      - 'e2e/pyodide-browser/**'
      - 'e2e/build-contract/**'
  pull_request:
    paths:
      - '.github/workflows/pyodide.yml'
      - 'crates/wasmsh-runtime/**'
      - 'crates/wasmsh-pyodide/**'
      - 'crates/wasmsh-pyodide-probe/**'
      - 'crates/wasmsh-fs/**'
      - 'tools/pyodide/**'
      - 'e2e/pyodide-node/**'
      - 'e2e/pyodide-browser/**'
      - 'e2e/build-contract/**'

jobs:
  build-and-test:
    name: Pyodide build + E2E
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: pyodide

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential wget ccache pkg-config xz-utils

      - name: Build custom Pyodide (includes probe + runtime)
        run: just build-pyodide
        env:
          SED: sed
          # Pyodide's libffi build calls autoreconf which needs libtool m4 macros.
          # Pre-copy the system libtool.m4 into the libffi checkout during build.
          PYODIDE_JOBS: "3"

      - name: Run Pyodide Node E2E
        run: just test-e2e-pyodide-node

      - name: Install Playwright browsers
        working-directory: e2e/pyodide-browser
        run: npm install && npx playwright install chromium --with-deps

      - name: Run Pyodide browser E2E
        run: just test-e2e-pyodide-browser
