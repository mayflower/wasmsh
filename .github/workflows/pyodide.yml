name: Pyodide

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pyodide.yml'
      - 'crates/wasmsh-runtime/**'
      - 'crates/wasmsh-pyodide/**'
      - 'crates/wasmsh-pyodide-probe/**'
      - 'crates/wasmsh-fs/**'
      - 'tools/pyodide/**'
      - 'e2e/pyodide-node/**'
      - 'e2e/pyodide-browser/**'
      - 'e2e/build-contract/**'
  pull_request:
    paths:
      - '.github/workflows/pyodide.yml'
      - 'crates/wasmsh-runtime/**'
      - 'crates/wasmsh-pyodide/**'
      - 'crates/wasmsh-pyodide-probe/**'
      - 'crates/wasmsh-fs/**'
      - 'tools/pyodide/**'
      - 'e2e/pyodide-node/**'
      - 'e2e/pyodide-browser/**'
      - 'e2e/build-contract/**'

jobs:
  build-and-test:
    name: Pyodide build + E2E
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ── Tier-2 cache: Pyodide source + emsdk ────────────────────
      # The Pyodide build is the dominant cost in CI (~30 min).  Most
      # of that time is the emsdk install (~5 min) and the CPython +
      # libffi + pyodide-build builds.  Both are version-locked: they
      # only need to rebuild when `tools/pyodide/versions.env` changes
      # (the single source of truth for PYODIDE_VERSION + EMSCRIPTEN
      # _VERSION).  Cache the whole `pyodide-src/` tree keyed on its
      # hash so subsequent CI runs skip straight to the wasmsh staticlib
      # build + final emcc relink.
      #
      # Safety: even if a cached pyodide.asm.wasm contains stale code,
      # build-custom.sh deletes it when the freshly-built wasmsh
      # staticlib is newer (see "Runtime lib is newer than" guard
      # added in 0e447bb).  Per-patch idempotency from b1ad993 means
      # cached patched files don't double-apply on re-run.
      #
      # No `restore-keys` fallback: a versions.env bump must rebuild
      # from scratch, not silently reuse an old emsdk install.
      - name: Cache Pyodide source + emsdk
        uses: actions/cache@v4
        with:
          path: tools/pyodide/pyodide-src
          key: pyodide-toolchain-${{ runner.os }}-${{ hashFiles('tools/pyodide/versions.env') }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: pyodide

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential wget ccache pkg-config xz-utils autoconf automake libtool

      - name: Build custom Pyodide (links wasmsh runtime staticlib)
        run: just build-pyodide
        env:
          SED: sed
          # Pyodide's libffi build calls autoreconf which needs libtool m4 macros.
          # Pre-copy the system libtool.m4 into the libffi checkout during build.
          PYODIDE_JOBS: "3"

      # Build-contract canary: proves that a standalone wasmsh staticlib
      # (`wasmsh-pyodide-probe`) compiles cleanly for
      # `wasm32-unknown-emscripten` in isolation, without depending on the
      # full Pyodide build pipeline. Catches regressions in emscripten
      # toolchain / target bring-up before they hide behind the much
      # slower Pyodide build.
      - name: Run emscripten build-contract test
        run: just test-emscripten-probe

      - name: Run Pyodide Node E2E
        run: just test-e2e-pyodide-node

      - name: Install Playwright browsers
        working-directory: e2e/pyodide-browser
        run: npm install && npx playwright install chromium --with-deps

      - name: Run Pyodide browser E2E
        run: just test-e2e-pyodide-browser

      - name: Upload Pyodide artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmsh-pyodide
          path: dist/pyodide-custom/
