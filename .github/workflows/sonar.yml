name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: mayflower-k8s-runners
    env:
      SONAR_TOKEN_SET: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Check SonarQube secrets availability
        id: sonar_secrets
        run: |
          if [ "$SONAR_TOKEN_SET" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured; skipping scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.sonar_secrets.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Cache SonarQube scanner
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('sonar-project.properties') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: SonarQube Scan
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
