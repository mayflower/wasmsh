name: SonarQube

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: mayflower-k8s-runners
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      SONAR_TOKEN_SET: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Check SonarQube secrets availability
        id: sonar_secrets
        run: |
          if [ "$SONAR_TOKEN_SET" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured; skipping scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.sonar_secrets.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Download coverage from CI workflow
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check coverage availability
        if: steps.sonar_secrets.outputs.skip != 'true'
        id: coverage
        run: |
          if [ -f "coverage/sonar-coverage.xml" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube coverage XML found"
          elif [ -f "coverage/lcov.info" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "lcov report found (will use as fallback)"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No coverage report found; scanning without coverage"
          fi

      - name: Cache SonarQube scanner
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('sonar-project.properties') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: SonarQube Scan
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >-
            ${{ steps.coverage.outputs.available == 'true' && '-Dsonar.coverageReportPaths=coverage/sonar-coverage.xml' || '' }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
