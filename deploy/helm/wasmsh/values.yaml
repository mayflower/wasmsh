# Default values for wasmsh.
#
# This chart deploys the scalable internal-only sandbox control plane:
# - dispatcher ClusterIP service
# - runner Deployment
# - runner headless discovery service
# - runner network policy
# - runner HPA
# - optional runner monitoring resources

nameOverride: ""
fullnameOverride: ""

commonLabels: {}

imagePullSecrets: []

dispatcher:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/mayflower/wasmsh-dispatcher
    tag: ""
    digest: sha256:3333333333333333333333333333333333333333333333333333333333333333
    pullPolicy: IfNotPresent
  host: "0.0.0.0"
  port: 8080
  # Bearer-token auth on /sessions* routes. Set `token` inline for quick
  # demos or point at a pre-existing Secret (`existingSecretName`) for
  # anything resembling production. Leave both unset to run open — only
  # safe inside a private mesh with the NetworkPolicy gating ingress.
  #
  # `required: true` is a chart-side guard: it makes `helm install/upgrade`
  # FAIL if neither `token` nor `existingSecretName` is set. Set it on
  # any non-loopback production deployment so an unattended chart
  # rollout cannot silently expose an open API.
  auth:
    required: false
    token: ""
    existingSecretName: ""
    existingSecretKey: token
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  priorityClassName: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  pdb:
    enabled: true
    minAvailable: 1
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  extraEnv: []

runner:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/mayflower/wasmsh-runner
    tag: ""
    digest: sha256:2222222222222222222222222222222222222222222222222222222222222222
    pullPolicy: IfNotPresent
  command:
    - node
    - tools/runner-node/src/server.mjs
  host: "0.0.0.0"
  port: 8787
  # Bearer-token auth on every runner endpoint except /healthz and
  # /readyz. When configured, the dispatcher injects the same token on
  # every outbound request so cross-pod traffic continues to work. Empty
  # = no auth (legacy; relies on the NetworkPolicy to gate ingress).
  auth:
    token: ""
    existingSecretName: ""
    existingSecretKey: token
  restoreSlots: 4
  startupWarmRestores: 2
  fetchBroker:
    requestBytes: 65536
    responseBytes: 1048576
  workerResourceLimits:
    maxOldGenerationMb: 48
    maxYoungGenerationMb: 8
    stackMb: 1
    codeRangeMb: 8
  service:
    port: 8787
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  priorityClassName: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: "12"
      memory: 24Gi
    limits:
      cpu: "16"
      memory: 32Gi
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  pdb:
    enabled: true
    minAvailable: 1
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  extraEnv: []

networkPolicy:
  enabled: true
  dns:
    enabled: true
    namespaceSelector: {}
  extraEgress: []

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  metric:
    type: Pods
    name: wasmsh_inflight_restores
    averageValue: "2"

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    targetLabels:
      - release
    labels: {}
    namespace: ""
  prometheusRule:
    enabled: false
    labels: {}
    namespace: ""
    restoreP95ThresholdMs: 250
    queueDepthThreshold: 8
    failureRateWindow: 15m
    failureCountThreshold: 1
