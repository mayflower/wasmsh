{{- if and .Values.runner.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wasmsh.componentName" (dict "root" . "component" "runner") }}-ingress-egress
  labels:
    {{- include "wasmsh.componentLabels" (dict "root" . "component" "runner") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wasmsh.componentSelectorLabels" (dict "root" . "component" "runner") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "wasmsh.componentSelectorLabels" (dict "root" . "component" "dispatcher") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.runner.service.port }}
  egress:
    {{- if .Values.networkPolicy.dns.enabled }}
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.namespaceSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
