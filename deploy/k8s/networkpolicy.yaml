apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wasmsh-runner-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wasmsh-runner
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wasmsh-dispatcher
      ports:
        - protocol: TCP
          port: 8787
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
