apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wasmsh-runner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wasmsh-runner
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: wasmsh_inflight_restores
        target:
          type: AverageValue
          averageValue: "2"
