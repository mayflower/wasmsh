apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasmsh-dispatcher
  labels:
    app.kubernetes.io/name: wasmsh-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wasmsh-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wasmsh-dispatcher
    spec:
      containers:
        - name: dispatcher
          image: ghcr.io/mayflower/wasmsh-dispatcher@sha256:3333333333333333333333333333333333333333333333333333333333333333
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: RUNNER_SERVICE_URLS
              value: http://wasmsh-runner-headless:8787
            - name: DISPATCHER_POLICY
              value: restore-capacity-only
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
